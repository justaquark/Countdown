<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Regresiva</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-weight: 300;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        #countdown {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .time-segment {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            min-width: 80px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .number {
            display: block;
            font-size: 3rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SEMANA INTERNACIONAL DE LA MOTO MAZATLÁN</h1>
    <div id="countdown">
        <div class="time-segment">
            <span class="number" id="days">00</span>
            <span class="label">Días</span>
        </div>
        <div class="time-segment">
            <span class="number" id="hours">00</span>
            <span class="label">Horas</span>
        </div>
        <div class="time-segment">
            <span class="number" id="minutes">00</span>
            <span class="label">Minutos</span>
        </div>
        <div class="time-segment">
            <span class="number" id="seconds">00</span>
            <span class="label">Segundos</span>
        </div>
    </div>
</div>

<script>
    // ================================================================
    // CONFIGURA TU FECHA AQUÍ (Formato: "DD/MM/AAAA HH:MM:SS")
    // ================================================================
    const FECHA_OBJETIVO_STR = "07/04/2026 06:00:00"; 
    // ================================================================

    function parseDate(str) {
        const [datePart, timePart] = str.split(' ');
        const [day, month, year] = datePart.split('/');
        const [hours, minutes, seconds] = timePart.split(':');
        // El mes en JS empieza en 0 (Enero es 0), por eso restamos 1
        return new Date(year, month - 1, day, hours, minutes, seconds).getTime();
    }

    const countdownDate = parseDate(FECHA_OBJETIVO_STR);

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = countdownDate - now;

        // Cálculos de tiempo
        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distance % (1000 * 60)) / 1000);

        // Mostrar resultados con formato de dos dígitos
        document.getElementById("days").innerHTML = d < 10 ? "0" + d : d;
        document.getElementById("hours").innerHTML = h < 10 ? "0" + h : h;
        document.getElementById("minutes").innerHTML = m < 10 ? "0" + m : m;
        document.getElementById("seconds").innerHTML = s < 10 ? "0" + s : s;

        // Si la cuenta regresiva termina
        if (distance < 0) {
            clearInterval(timer);
            document.querySelector(".container").innerHTML = "<h1>¡TIEMPO CUMPLIDO!</h1>";
        }
    }, 1000);
</script>

</body>
</html>
